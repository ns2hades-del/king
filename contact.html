<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - VITCH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white">
    <!-- Navbar -->
    <nav class="bg-gray-800 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-primary">VITCH</a>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="hover:text-primary transition">Accueil</a></li>
                <li><a href="services.html" class="hover:text-primary transition">Services</a></li>
                <li><a href="about.html" class="hover:text-primary transition">À propos</a></li>
                <li><a href="contact.html" class="hover:text-primary transition">Contact</a></li>
                <li><a href="dashboard.html" class="hover:text-primary transition">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="py-20 bg-gray-800">
        <div class="container mx-auto">
            <h1 class="text-4xl font-bold text-center mb-12">Contactez-nous</h1>
            <div class="grid md:grid-cols-2 gap-12">
                <div>
                    <h2 class="text-2xl font-semibold mb-6">Informations de contact</h2>
                    <p class="mb-4"><strong>Téléphone:</strong></p>
                    <p>+299 0149488847</p>
                    <p>+229 01 16 22 00 91</p>
                    <p class="mt-4"><strong>Email:</strong> <a href="mailto:sctvitch@gmail.com" class="text-primary">sctvitch@gmail.com</a></p>
                </div>
                <div>
                    <h2 class="text-2xl font-semibold mb-6">Envoyez-nous un message</h2>
                    <form class="space-y-4">
                        <div>
                            <label for="name" class="block mb-2">Nom</label>
                            <input type="text" id="name" class="w-full p-3 bg-gray-700 rounded-lg" required>
                        </div>
                        <div>
                            <label for="email" class="block mb-2">Email</label>
                            <input type="email" id="email" class="w-full p-3 bg-gray-700 rounded-lg" required>
                        </div>
                        <div>
                            <label for="message" class="block mb-2">Message</label>
                            <textarea id="message" rows="5" class="w-full p-3 bg-gray-700 rounded-lg" required></textarea>
                        </div>
                        <button type="submit" class="bg-primary hover:bg-blue-700 text-white px-6 py-3 rounded-lg transition">Envoyer</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 py-8 text-center">
        <p>&copy; 2026 VITCH. Tous droits réservés.</p>
    </footer>

    <script>
        // Simple form handling (demo)
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Message envoyé !');
        });
    </script>
</body>
</html>
